<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MahaKhat - रिटेलर एक्सेल अपलोड</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; }
        .form-container { background-color: white; max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; margin-bottom: 10px; font-size: 22px; text-align: center; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        .upload-box { border: 2px dashed #2e7d32; padding: 30px; text-align: center; border-radius: 6px; background-color: #fafdfff5; cursor: pointer; margin-bottom: 20px; }
        .upload-box input { display: none; }
        .upload-box p { font-size: 16px; color: #444; font-weight: 500; }
        .file-info { display: none; background-color: #e8f5e9; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; font-weight: bold; color: #2e7d32; }
        .btn-container { display: flex; gap: 15px; margin-top: 25px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-submit { background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%); color: white; }
        .btn-submit:hover { background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%); }
        .btn-submit:disabled { background: #cccccc; cursor: not-allowed; }
        .btn-back { background-color: #757575; color: white; text-align: center; text-decoration: none; display: block; padding: 12px; border-radius: 5px; font-weight: bold; flex: 1; }
        .message { margin-top: 15px; text-align: center; font-size: 15px; font-weight: 500; white-space: pre-line; }
        .error-msg { color: #d32f2f; }
        .success-msg { color: #2e7d32; }
        .view-only-banner { display: none; background-color: #fff3e0; color: #e65100; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="form-container">
    <div id="viewOnlyBanner" class="view-only-banner">⚠️ तुम्हाला केवळ पाहण्याचा (View Only) ॲक्सेस आहे. तुम्ही फाईल अपलोड करू शकत नाही.</div>
    
    <h2>iFMS रिटेलर खत साठा अपलोड</h2>
    <p class="subtitle">तुमच्या जिल्ह्याची डाऊनलोड केलेली एक्सेल फाईल (.xlsx) येथे अपलोड करा</p>
    
    <div class="upload-box" onclick="document.getElementById('excelFile').click()">
        <p>📁 येथे क्लिक करून एक्सेल फाईल निवडा</p>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
    </div>

    <div id="fileInfo" class="file-info"></div>
    
    <div class="btn-container">
        <a href="../dashboard.html" class="btn-back">मागे जा</a>
        <button id="uploadBtn" class="btn-submit" disabled>फाईल अपलोड करा</button>
    </div>
    
    <div id="msgWindow" class="message"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjvCs1T14Llmy3RIOLDHemNOHWl0mJLNIQB5-zupyc4DEXHfHE5KvG5sPR5b-oYmJT/exec";
    let isViewOnly = false;
    let parsedRows = [];

    document.addEventListener('DOMContentLoaded', function() {
        const sessionData = sessionStorage.getItem('mahakhat_user');
        if (!sessionData) { alert("कृपया आधी लॉगिन करा."); window.location.href = "../login.html"; return; }
        
        const user = JSON.parse(sessionData);
        if (user.access.dataEntry === "NO") { alert("ॲक्सेस नाकारला."); window.location.href = "../dashboard.html"; return; }
        if (user.access.dataEntry === "ViewOnly") { isViewOnly = true; document.getElementById('viewOnlyBanner').style.display = "block"; }
    });

    // एक्सेल फाईल सिलेक्ट झाल्यावर ती वाचणे
    document.getElementById('excelFile').addEventListener('change', function(e) {
        if (isViewOnly) return;
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileInfo').style.display = "block";
        document.getElementById('fileInfo').textContent = "निवडलेली फाईल: " + file.name;

        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // एक्सेल मधील रो डेटा JSON मध्ये बदलणे
            const jsonRows = XLSX.utils.sheet_to_json(worksheet);
            
            if(jsonRows.length === 0) {
                alert("निवडलेली एक्सेल फाईल रिकामी आहे.");
                return;
            }
            
            parsedRows = jsonRows;
            document.getElementById('uploadBtn').disabled = false;
            document.getElementById('msgWindow').className = "message success-msg";
            document.getElementById('msgWindow').textContent = "एकूण " + jsonRows.length + " रेकॉर्ड्स सापडले. अपलोड करण्यासाठी तयार!";
        };
        reader.readAsArrayBuffer(file);
    });

    // फाईल सर्व्हरवर (Google Script) पाठवणे
    document.getElementById('uploadBtn').addEventListener('click', function() {
        if (isViewOnly || parsedRows.length === 0) return;

        const msgWin = document.getElementById('msgWindow');
        const uploadBtn = document.getElementById('uploadBtn');

        msgWin.className = "message success-msg";
        msgWin.textContent = "डेटा प्रोसेस होत आहे...\nजिल्ह्याचा जुना डेटा काढला जात आहे व नवीन डेटा सेव्ह होत आहे.\nकृपया थोडा वेळ थांबा...";
        uploadBtn.disabled = true;

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'uploadRetailerStock',
                rowsData: parsedRows
            })
        })
        .then(response => response.json())
        .then(data => {
            uploadBtn.disabled = false;
            if (data.success) {
                msgWin.className = "message success-msg";
                msgWin.textContent = "मॅपिंग यशस्वी!\n" + data.message;
                document.getElementById('excelFile').value = "";
                document.getElementById('fileInfo').style.display = "none";
                parsedRows = [];
            } else {
                msgWin.className = "message error-msg";
                msgWin.textContent = "त्रुटी: " + data.message;
            }
        })
        .catch(error => {
            uploadBtn.disabled = false;
            msgWin.className = "message error-msg";
            msgWin.textContent = "सर्व्हरशी संपर्क होऊ शकला नाही. पुन्हा प्रयत्न करा.";
            console.error(error);
        });
    });
</script>

</body>
</html>
