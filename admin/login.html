<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MahaKhat - अधिकारी लॉगिन</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Nirmala UI', Arial, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #2e7d32;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-area h1 {
            color: #2e7d32;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .logo-area p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4caf50;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
        }
        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .error-msg { color: #d32f2f; }
        .success-msg { color: #2e7d32; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-area">
        <h1>महाखत (MahaKhat)</h1>
        <p>प्रशासकीय नियंत्रण व डेटा एंट्री पॅनेल</p>
    </div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="username">युझर आयडी (User ID)</label>
            <input type="text" id="username" placeholder="उदा. adowashim" required>
        </div>
        
        <div class="form-group">
            <label for="password">पासवर्ड (Password)</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit">लॉगिन करा</button>
    </form>
    
    <div id="msgWindow" class="message"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msgWin = document.getElementById('msgWindow');
        
        msgWin.className = "message success-msg";
        msgWin.textContent = "आयपी आणि पासवर्ड पडताळणी होत आहे...";
        
        // सुरक्षिततेचे मुख्य लॉजिक आपण पुढील टप्प्यात जोडू
        console.log("Login attempt:", user);
    });
<script>
    // तुमची नवीन Google Apps Script Web App URL इथे टाका
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeF4tpE-B8WwpYEz35ypqTgEUCLgRgFB324UOlyMZG06wPbVq3JFisCwr4bzEZV9qp/exec";

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msgWin = document.getElementById('msgWindow');
        const submitBtn = document.querySelector('button[type="submit"]');
        
        // लोडिंग मेसेज
        msgWin.className = "message success-msg";
        msgWin.textContent = "प्रतीक्षा करा, माहिती तपासली जात आहे...";
        submitBtn.disabled = true;
        submitBtn.textContent = "तपासत आहे...";
        
        // गुगल स्क्रिप्टला डेटा पाठवणे
        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'login',
                username: user,
                password: pass
            })
        })
        .then(response => response.json())
        .then(data => {
            submitBtn.disabled = false;
            submitBtn.textContent = "लॉगिन करा";
            
            if (data.success) {
                msgWin.className = "message success-msg";
                msgWin.textContent = data.message;
                
                // अधिकाऱ्याची माहिती ब्राउझरमध्ये सेव्ह करणे (डॅशबोर्डसाठी)
                sessionStorage.setItem('mahakhat_user', JSON.stringify(data.user));
                
                // लॉगिन यशस्वी झाल्यावर डॅशबोर्डवर पाठवणे
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000);
            } else {
                msgWin.className = "message error-msg";
                msgWin.textContent = data.message; // "चुकीचा युझर आयडी किंवा पासवर्ड."
            }
        })
        .catch(error => {
            submitBtn.disabled = false;
            submitBtn.textContent = "लॉगिन करा";
            msgWin.className = "message error-msg";
            msgWin.textContent = "सर्व्हरशी संपर्क होऊ शकला नाही. पुन्हा प्रयत्न करा.";
            console.error("Error:", error);
        });
    });
</script>

</body>
</html>
